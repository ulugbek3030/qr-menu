<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nocturnal Gallery</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "background": "#131313",
            "primary": "#f2ca50",
            "primary-container": "#d4af37",
            "on-primary": "#3c2f00",
            "on-primary-container": "#554300",
            "secondary": "#eac249",
            "secondary-container": "#b08c10",
            "on-secondary": "#3d2f00",
            "on-surface": "#e5e2e1",
            "on-surface-variant": "#d0c5af",
            "on-background": "#e5e2e1",
            "surface": "#131313",
            "surface-container": "#201f1f",
            "surface-container-low": "#1c1b1b",
            "surface-container-lowest": "#0e0e0e",
            "surface-container-high": "#2a2a2a",
            "surface-container-highest": "#353534",
            "surface-bright": "#393939",
            "surface-variant": "#353534",
            "outline": "#99907c",
            "outline-variant": "#4d4635",
            "primary-fixed": "#ffe088",
            "primary-fixed-dim": "#e9c349",
            "error": "#ffb4ab",
            "error-container": "#93000a",
          },
          fontFamily: {
            "headline": ["Manrope", "sans-serif"],
            "body": ["Inter", "sans-serif"],
            "label": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "1rem",
            "lg": "2rem",
            "xl": "3rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container min-h-screen">

  <!-- Header -->
  <header id="app-header" class="fixed top-0 w-full z-50 bg-[#131313]/70 backdrop-blur-xl">
    <div class="flex justify-between items-center px-5 py-3 max-w-lg mx-auto">
      <div class="flex items-center gap-3 cursor-pointer" onclick="location.hash='#/'">
        <img id="header-logo" alt="Logo" class="h-7 w-auto object-contain" src="">
        <h1 class="text-sm tracking-[0.15em] font-light text-[#D4AF37] font-headline uppercase">NOCTURNAL GALLERY</h1>
      </div>
      <button class="flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-outline-variant/30 hover:bg-[#D4AF37]/10 transition-colors active:scale-95">
        <span class="material-symbols-outlined text-[#D4AF37] text-sm">notifications</span>
        <span class="text-[9px] uppercase tracking-widest font-label font-bold text-[#D4AF37]">Waiter</span>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main id="app" class="pt-16 pb-24 max-w-lg mx-auto"></main>

  <!-- Bottom Navigation -->
  <nav id="bottom-nav" class="fixed bottom-0 left-0 w-full flex justify-around items-end pb-5 pt-2 px-4 bg-[#131313]/80 backdrop-blur-2xl rounded-t-[2rem] z-50 shadow-[0_-4px_24px_rgba(212,175,55,0.06)]">
    <a href="#/" class="nav-item flex flex-col items-center justify-center p-2 transition-all" data-nav="home">
      <span class="material-symbols-outlined text-xl">restaurant</span>
      <span class="font-label text-[9px] uppercase tracking-widest mt-0.5">Menu</span>
    </a>
    <a href="#/search" class="nav-item flex flex-col items-center justify-center p-2 transition-all" data-nav="search">
      <span class="material-symbols-outlined text-xl">search</span>
      <span class="font-label text-[9px] uppercase tracking-widest mt-0.5">Search</span>
    </a>
    <a href="#/cart" class="nav-item flex flex-col items-center justify-center p-2 transition-all relative" data-nav="cart">
      <span class="material-symbols-outlined text-xl">shopping_bag</span>
      <span id="cart-badge" class="absolute -top-0.5 right-0.5 min-w-[16px] h-4 bg-primary text-black text-[9px] font-bold rounded-full flex items-center justify-center px-1 hidden">0</span>
      <span class="font-label text-[9px] uppercase tracking-widest mt-0.5">Cart</span>
    </a>
    <a href="#/profile" class="nav-item flex flex-col items-center justify-center p-2 transition-all" data-nav="profile">
      <span class="material-symbols-outlined text-xl">person</span>
      <span class="font-label text-[9px] uppercase tracking-widest mt-0.5">Profile</span>
    </a>
  </nav>

  <!-- Scripts -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
